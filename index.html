        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
        import { getFirestore, collection, addDoc, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAcvwNe51K8T3f-58oiNIU-WQbQZuYjOAo",
            authDomain: "makeowndashboard.firebaseapp.com",
            projectId: "makeowndashboard",
            storageBucket: "makeowndashboard.firebasestorage.app",
            messagingSenderId: "791722954695",
            appId: "1:791722954695:web:ce22cc59fad57d22d053e2",
            measurementId: "G-20DS6V8JDB"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);

        window.publishToFirebase = async (dashboardJSON) => {
            try {
                const docRef = await addDoc(collection(db, "dashboards"), dashboardJSON);
                return docRef.id;
            } catch (e) {
                console.error("❌ 建立失敗: ", e); throw e;
            }
        };

        window.updateToFirebase = async (id, dashboardJSON) => {
            try {
                const docRef = doc(db, "dashboards", id);
                await setDoc(docRef, dashboardJSON);
                return id;
            } catch (e) {
                console.error("❌ 更新失敗: ", e); throw e;
            }
        };

        window.loadFromFirebase = async (id) => {
            try {
                const docRef = doc(db, "dashboards", id);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) return docSnap.data();
                else return null;
            } catch (e) {
                console.error("❌ 讀取失敗: ", e); throw e;
            }
        };

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const RGL = window.ReactGridLayout;
        const ResponsiveRGL = RGL.WidthProvider(RGL);

        Chart.register(ChartDataLabels);

        function PreviewViewer({ config }) {
            const [dataMap, setDataMap] = useState({});
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [filters, setFilters] = useState({});

            useEffect(() => {
                const fetchData = async () => {
                    if (!config.sheetSources || config.sheetSources.length === 0) {
                        setError("請先在編輯模式設定至少一個 Google Sheet 資料源");
                        setLoading(false); return;
                    }
                    try {
                        const newDataMap = {};
                        await Promise.all(config.sheetSources.map(async (source) => {
                            if (!source.sheetId) return;
                            const url = `https://docs.google.com/spreadsheets/d/${source.sheetId}/gviz/tq?tqx=out:json&headers=1&tq&gid=${source.gid || '0'}`;
                            const res = await fetch(url);
                            const text = await res.text();
                            const json = JSON.parse(text.substring(47, text.length - 2));

                            let cols = json.table.cols.map(c => c.label).filter(l => l && l.trim() !== '');
                            let rowsData = json.table.rows;

                            if (cols.length === 0 && rowsData.length > 0) {
                                cols = rowsData[0].c.map(cell => cell ? (cell.f || cell.v || '') : '').filter(l => String(l).trim() !== '');
                                rowsData = rowsData.slice(1);
                            }

                            const parsedData = rowsData.map(row => {
                                let obj = {};
                                row.c.forEach((cell, i) => {
                                    if (cols[i]) {
                                        obj[cols[i]] = cell ? (cell.f ? String(cell.f) : (cell.v !== null ? String(cell.v) : '')) : '';
                                    }
                                });
                                return obj;
                            });
                            newDataMap[source.id] = parsedData;
                        }));
                        setDataMap(newDataMap);
                    } catch (err) {
                        setError("部分資料庫讀取失敗，請確認 Sheet ID 與權限。");
                    }
                    setLoading(false);
                };
                fetchData();
            }, [config.sheetSources]);

            const sortedComponents = [...config.components].sort((a, b) => {
                if (a.layout.y === b.layout.y) return a.layout.x - b.layout.x;
                return a.layout.y - b.layout.y;
            });

            const dropdownComps = sortedComponents.filter(c => c.type === 'dropdown');
            const orderedDropdownCols = dropdownComps.map(c => c.categoryColumn);
            const firstDropdownCol = dropdownComps.length > 0 ? dropdownComps[0].categoryColumn : null;
            const isChartVisible = firstDropdownCol ? !!filters[firstDropdownCol] : true;

            const dropdownState = {};
            for (let i = 0; i < dropdownComps.length; i++) {
                const col = dropdownComps[i].categoryColumn;
                if (i === 0) dropdownState[col] = false;
                else dropdownState[col] = !filters[dropdownComps[i - 1].categoryColumn];
            }

            const filteredDataMap = {};
            if (config.sheetSources) {
                config.sheetSources.forEach(source => {
                    const sourceData = dataMap[source.id] || [];
                    filteredDataMap[source.id] = sourceData.filter(row => {
                        for (let key in filters) {
                            if (filters[key] && row[key] !== undefined && row[key] !== filters[key]) {
                                return false;
                            }
                        }
                        return true;
                    });
                });
            }

            const handleFilterChange = (column, value) => {
                setFilters(prev => {
                    const newFilters = { ...prev, [column]: value };
                    const changedIdx = dropdownComps.findIndex(c => c.categoryColumn === column);
                    if (changedIdx !== -1) {
                        for (let i = changedIdx + 1; i < dropdownComps.length; i++) {
                            newFilters[dropdownComps[i].categoryColumn] = '';
                        }
                    }
                    return newFilters;
                });
            };

            const clearFilters = () => setFilters({});

            const aggregateData = (rawData, categoryCol, valueCol, aggType) => {
                if (!valueCol) return {};
                let result = {};
                rawData.forEach(row => {
                    let catRaw = categoryCol ? (row[categoryCol] || '未分類') : '總計';
                    if (aggType === 'first') {
                        if (result[catRaw] === undefined) result[catRaw] = row[valueCol] || '';
                        return;
                    }
                    if (typeof catRaw === 'string' && catRaw.includes('|') && catRaw.includes(':')) {
                        let parts = catRaw.split('|');
                        parts.forEach(part => {
                            let [subCat, subValStr] = part.split(':');
                            if (subCat && subValStr !== undefined) {
                                let val = parseFloat(String(subValStr).replace(/,/g, '')) || 0;
                                if (val > 0) {
                                    if (aggType === 'sum') result[subCat] = (result[subCat] || 0) + val;
                                    else if (aggType === 'count') result[subCat] = (result[subCat] || 0) + 1;
                                }
                            }
                        });
                    } else {
                        let val = parseFloat(String(row[valueCol]).replace(/,/g, '')) || 0;
                        if (val > 0 || aggType === 'count') {
                            if (aggType === 'sum') result[catRaw] = (result[catRaw] || 0) + val;
                            else if (aggType === 'count') result[catRaw] = (result[catRaw] || 0) + 1;
                        }
                    }
                });
                return result;
            };

            const aggregateStackedData = (rawData, categoryCol, valueCols, aggType) => {
                const categories = [...new Set(rawData.map(r => r[categoryCol]))].filter(Boolean);
                let datasetsMap = {};
                categories.forEach((cat, catIndex) => {
                    const rows = rawData.filter(r => r[categoryCol] === cat);
                    rows.forEach(r => {
                        valueCols.forEach(col => {
                            if (!col) return;
                            let valRaw = r[col];
                            if (typeof valRaw === 'string' && valRaw.includes('|') && valRaw.includes(':')) {
                                let parts = valRaw.split('|');
                                parts.forEach(part => {
                                    let [subCat, subValStr] = part.split(':');
                                    if (subCat && subValStr !== undefined) {
                                        let val = parseFloat(String(subValStr).replace(/,/g, '')) || 0;
                                        if (!datasetsMap[subCat]) datasetsMap[subCat] = new Array(categories.length).fill(0);
                                        if (aggType === 'sum') datasetsMap[subCat][catIndex] += val;
                                        else if (aggType === 'count' && val > 0) datasetsMap[subCat][catIndex] += 1;
                                    }
                                });
                            } else {
                                let val = parseFloat(String(valRaw).replace(/,/g, '')) || 0;
                                if (!datasetsMap[col]) datasetsMap[col] = new Array(categories.length).fill(0);
                                if (aggType === 'sum') datasetsMap[col][catIndex] += val;
                                else if (aggType === 'count' && val > 0) datasetsMap[col][catIndex] += 1;
                            }
                        });
                    });
                });
                const datasets = Object.keys(datasetsMap).map(label => ({ label: label, data: datasetsMap[label] }));
                return { categories, datasets };
            };

            if (loading) return <div className="preview-container"><h3 style={{ textAlign: 'center' }}>資料載入中，請稍候...</h3></div>;
            if (error) return <div className="preview-container"><h3 style={{ color: 'red', textAlign: 'center' }}>{error}</h3></div>;

            return (
                <div className="preview-container">
                    <div className="news-header">
                        <div style={{ flex: 1, textAlign: config.meta.titleAlign || 'left' }}>
                            <h2 className="news-title" style={{
                                color: config.meta.titleColor || '#222',
                                fontSize: config.meta.titleFontSize || '1.8rem',
                                fontWeight: config.meta.titleFontWeight || '900',
                                fontFamily: config.meta.titleFontFamily || 'inherit',
                                margin: 0
                            }}>
                                {config.meta.title}
                            </h2>
                        </div>
                        {config.meta.watermarkUrl && config.meta.watermarkPosition === 'top-right' && (
                            <img src={config.meta.watermarkUrl} alt="Watermark" className="news-watermark" style={{ height: `${config.meta.watermarkSize || 40}px`, marginLeft: '15px' }} />
                        )}
                    </div>

                    {Object.values(filters).some(v => v) && (
                        <button className="reset-filter-btn" onClick={clearFilters}>↺ 清除所有篩選與重新開始</button>
                    )}

                    <div className="preview-grid">
                        {sortedComponents.map(comp => (
                            <ChartComponent
                                key={comp.id} comp={comp}
                                rawData={dataMap[comp.dataSourceId] || []}
                                filteredData={filteredDataMap[comp.dataSourceId] || []}
                                aggregateData={aggregateData} filters={filters} onFilterChange={handleFilterChange}
                                isChartVisible={isChartVisible} isDropdownDisabled={dropdownState[comp.categoryColumn]}
                                firstDropdownCol={firstDropdownCol} orderedDropdownCols={orderedDropdownCols}
                                aggregateStackedData={aggregateStackedData}
                            />
                        ))}
                    </div>

                    <div className="news-footer">
                        <div className="news-footer-left">
                            {config.meta.lastUpdated && <div>🕒 更新時間：{config.meta.lastUpdated}</div>}
                            {config.meta.dataSources && config.meta.dataSources.length > 0 && (
                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '5px', alignItems: 'center' }}>
                                    <span>資料來源：</span>
                                    {config.meta.dataSources.map((source, idx) => (
                                        <span key={idx}>
                                            {source.url ? (
                                                <a href={source.url} target="_blank" rel="noreferrer">{source.name || '未命名來源'}</a>
                                            ) : (
                                                <span>{source.name || '未命名來源'}</span>
                                            )}
                                            {idx < config.meta.dataSources.length - 1 && '、'}
                                        </span>
                                    ))}
                                </div>
                            )}
                        </div>
                        {config.meta.watermarkUrl && config.meta.watermarkPosition === 'bottom-right' && (
                            <img src={config.meta.watermarkUrl} alt="Watermark" className="news-watermark" style={{ height: `${config.meta.watermarkSize || 40}px` }} />
                        )}
                    </div>
                </div>
            );
        }

        // 🌟 核心畫布元件 (排版完全體)
        function ChartComponent({ comp, rawData, filteredData, aggregateData, filters, onFilterChange, isChartVisible, isDropdownDisabled, firstDropdownCol, orderedDropdownCols, aggregateStackedData }) {
            const canvasRef = useRef(null);
            const chartInstance = useRef(null);
            const isChartType = ['barChart', 'pieChart', 'lineChart', 'stackedBarChart'].includes(comp.type);

            const [labelCount, setLabelCount] = useState(0);
            const [currentSlide, setCurrentSlide] = useState(0);
            const [hiddenSlices, setHiddenSlices] = useState({});

            useEffect(() => {
                setCurrentSlide(0);
                setHiddenSlices({});
            }, [filteredData, comp.categoryColumn]);

            const toggleSlice = (index) => {
                if (!chartInstance.current || comp.type !== 'pieChart') return;
                chartInstance.current.toggleDataVisibility(index);
                chartInstance.current.update();
                setHiddenSlices(prev => ({ ...prev, [index]: !prev[index] }));
            };

            // 📈 核心畫圖引擎
            useEffect(() => {
                if (isChartType && isChartVisible) {
                    if (comp.type === 'barChart' || comp.type === 'stackedBarChart') {
                        if (!comp.categoryColumn || !comp.multiValueCols || comp.multiValueCols.length === 0) return;
                    } else {
                        if (!comp.categoryColumn || !comp.valueColumn) return;
                    }

                    if (!canvasRef.current) return;

                    const ctx = canvasRef.current.getContext('2d');
                    if (chartInstance.current) chartInstance.current.destroy();

                    let chartType = 'bar';
                    const isHorizontal = comp.chartOrientation === 'horizontal';

                    const computedFont = window.getComputedStyle(canvasRef.current).fontFamily;
                    const defaultFontFamily = comp.fontFamily || computedFont || 'sans-serif';

                    const baseFontSize = parseInt(comp.axisLabelSize) || 12;
                    const tickFont = { size: baseFontSize, family: defaultFontFamily };
                    const gridColor = comp.axisGridColor || '#e0e0e0';

                    let options = {
                        responsive: true, maintainAspectRatio: false,
                        layout: { padding: comp.type === 'pieChart' ? baseFontSize + 25 : 0 },
                        indexAxis: isHorizontal ? 'y' : 'x',
                        plugins: {
                            legend: {
                                display: comp.type === 'pieChart' ? false : (comp.legendPosition !== 'none'),
                                position: comp.legendPosition !== 'none' ? (comp.legendPosition || 'top') : 'top',
                                labels: { color: comp.axisLabelColor || '#666', font: tickFont }
                            },
                            title: { display: false },
                            datalabels: { display: false } // 預設關閉，由各圖表自行開啟
                        },
                        scales: {}
                    };

                    const valueAxis = isHorizontal ? 'x' : 'y';
                    const categoryAxis = isHorizontal ? 'y' : 'x';

                    options.scales[categoryAxis] = {
                        // 強制畫出每一個標籤，不准隱藏
                        ticks: { color: comp.axisLabelColor || '#666', font: tickFont, autoSkip: false },
                        grid: { color: gridColor },
                        border: { display: true, color: gridColor },
                        title: { display: false },
                        stacked: comp.type === 'stackedBarChart'
                    };

                    options.scales[valueAxis] = {
                        ticks: { color: comp.axisLabelColor || '#666', font: tickFont },
                        grid: { color: gridColor },
                        border: { display: true, color: gridColor },
                        title: { display: false },
                        stacked: comp.type === 'stackedBarChart'
                    };

                    if (comp.stepSize) options.scales[valueAxis].ticks.stepSize = Number(comp.stepSize);
                    if (comp.yAxisMin !== undefined && comp.yAxisMin !== '') options.scales[valueAxis].min = Number(comp.yAxisMin);

                    const pieColors = ['#086788', '#F0C808', '#E74C3C', '#2ECC71', '#9B59B6', '#34495E', '#E67E22', '#1ABC9C'];
                    let labels = [];
                    let datasets = [];

                    if (comp.type === 'barChart' || comp.type === 'stackedBarChart') {
                        chartType = 'bar';
                        const cols = (comp.multiValueCols && comp.multiValueCols.length > 0) ? comp.multiValueCols : [comp.valueColumn, comp.compareValueColumn].filter(Boolean);
                        const stackedData = aggregateStackedData(filteredData, comp.categoryColumn, cols, comp.aggregation);
                        labels = stackedData.categories;
                        const customColors = Array.isArray(comp.customColors) ? comp.customColors : [];
                        datasets = stackedData.datasets.map((ds, idx) => ({
                            ...ds,
                            backgroundColor: customColors[idx] || pieColors[idx % pieColors.length],
                            maxBarThickness: 60
                        }));

                        if (comp.type === 'stackedBarChart' && comp.isPercentageStacked) {
                            const numCategories = labels.length; const numDatasets = datasets.length;
                            for (let j = 0; j < numCategories; j++) {
                                let total = 0; for (let i = 0; i < numDatasets; i++) total += datasets[i].data[j];
                                if (total > 0) { for (let i = 0; i < numDatasets; i++) datasets[i].data[j] = (datasets[i].data[j] / total) * 100; }
                            }
                            options.scales[valueAxis].max = 100;
                            options.plugins.datalabels = { display: true, formatter: (value) => value > 0 ? value.toFixed(0) + '%' : '', color: 'white', font: { weight: 'bold' } };
                        }
                    } else {
                        const mainColor = comp.themeColor || '#086788';
                        const aggData1 = aggregateData(filteredData, comp.categoryColumn, comp.valueColumn, comp.aggregation);
                        labels = Object.keys(aggData1); const data1 = Object.values(aggData1);

                        let pieCurrentColors = pieColors;
                        if (comp.type === 'pieChart' && Array.isArray(comp.pieCustomColors) && comp.pieCustomColors.length > 0) {
                            pieCurrentColors = comp.pieCustomColors;
                        }

                        const bgColors = comp.type === 'pieChart' ? labels.map((_, i) => pieCurrentColors[i % pieCurrentColors.length]) : mainColor;
                        datasets = [{ label: comp.compareValueColumn ? comp.valueColumn : comp.title, data: data1, backgroundColor: bgColors, borderColor: comp.type === 'lineChart' ? mainColor : undefined, fill: comp.type === 'lineChart' ? false : true, maxBarThickness: 60 }];

                        if (comp.compareValueColumn && comp.type !== 'pieChart') {
                            const aggData2 = aggregateData(filteredData, comp.categoryColumn, comp.compareValueColumn, comp.aggregation);
                            const data2 = labels.map(label => aggData2[label] || 0);
                            datasets.push({ label: comp.compareValueColumn, data: data2, backgroundColor: '#bdc3c7', borderColor: comp.type === 'lineChart' ? '#bdc3c7' : undefined, fill: comp.type === 'lineChart' ? false : true, maxBarThickness: 60 });
                        }

                        if (comp.type === 'pieChart') {
                            chartType = comp.pieStyle === 'pie' ? 'pie' : 'doughnut';
                            delete options.scales;
                            options.rotation = comp.pieRotation || 0;

                            // 🌟 修復：加回圓餅圖的 DataLabels 設定，讓標籤重新出現！
                            if (comp.showDataLabels) {
                                options.plugins.datalabels = {
                                    display: true,
                                    color: comp.dataLabelColor === '#ffffff' ? '#333333' : (comp.dataLabelColor || '#666666'),
                                    font: { weight: 'bold', size: baseFontSize, family: defaultFontFamily },
                                    anchor: 'end', align: 'end', offset: 5,
                                    formatter: (value, context) => {
                                        const dataset = context.chart.data.datasets[context.datasetIndex];
                                        const tSum = dataset.data.reduce((acc, curr) => acc + curr, 0);
                                        if (tSum === 0) return '';
                                        const percentage = (value / tSum) * 100;
                                        if (percentage < 1.5) return '';
                                        if (comp.dataLabelType === 'value') return Number(value).toLocaleString('zh-TW');
                                        else return Math.round(percentage) + '%';
                                    }
                                };
                            }
                        }
                        if (comp.type === 'lineChart') { chartType = 'line'; options.elements = { line: { tension: 0.3 } }; }
                    }

                    const sortMode = comp.sortBy || 'sheet';
                    if (sortMode === 'value_desc' || sortMode === 'value_asc') {
                        const combined = labels.map((label, idx) => {
                            let total = 0;
                            datasets.forEach(ds => { total += (Number(ds.data[idx]) || 0); });
                            return { label, idx, total };
                        });
                        combined.sort((a, b) => sortMode === 'value_desc' ? b.total - a.total : a.total - b.total);
                        labels = combined.map(item => item.label);
                        datasets = datasets.map(ds => ({ ...ds, data: combined.map(item => ds.data[item.idx]) }));
                    } else if (sortMode === 'category_asc') {
                        const combined = labels.map((label, idx) => ({ label, idx }));
                        combined.sort((a, b) => String(a.label).localeCompare(String(b.label)));
                        labels = combined.map(item => item.label);
                        datasets = datasets.map(ds => ({ ...ds, data: combined.map(item => ds.data[item.idx]) }));
                    }

                    if (labels.length !== labelCount) setLabelCount(labels.length);

                    chartInstance.current = new Chart(ctx, { type: chartType, data: { labels, datasets }, options });
                }
                return () => { if (chartInstance.current) chartInstance.current.destroy(); }
            }, [comp, filteredData, isChartVisible, labelCount]);

            // 📐 網格定位計算
            const finalH = comp.layout?.h || comp.h || 6;
            const isHorizontalChart = isChartType && comp.chartOrientation === 'horizontal';

            // 🌟 極限防擠壓空間
            const neededHeight = (isHorizontalChart && labelCount > 0) ? (labelCount * 40 + 80) : 0;
            const neededWidth = (!isHorizontalChart && labelCount > 0) ? (labelCount * 50 + 80) : 0;

            const colWidth = comp.layout?.desktopCols || comp.layout?.w || comp.w || 6;
            const colX = comp.layout?.x !== undefined ? (comp.layout.x + 1) : 'auto';
            const rowY = comp.layout?.y !== undefined ? (comp.layout.y + 1) : 'auto';

            const gridStyle = {
                gridColumn: colX !== 'auto' ? `${colX} / span ${colWidth}` : `span ${colWidth}`,
                gridRow: rowY !== 'auto' ? `${rowY} / span ${finalH}` : `span ${finalH}`,
                overflow: 'hidden', boxSizing: 'border-box',
                padding: comp.showTitle !== false ? '15px' : '0px 15px 15px 15px',
                display: 'flex', flexDirection: 'column',
                justifyContent: comp.showTitle !== false ? 'flex-start' : 'center',
                alignItems: 'stretch', minWidth: 0, width: '100%',
                height: '100%'
            };

            if (comp.type !== 'dropdown' && !isChartVisible) {
                return (
                    <div className="preview-card" style={gridStyle}>
                        {comp.showTitle !== false && comp.title && comp.type !== 'button' && <h3 className="preview-card-title" style={{ marginTop: 0, marginBottom: '15px', textAlign: 'center', width: '100%', fontSize: '1.25rem' }}>{comp.title}</h3>}
                        <div className="waiting-placeholder" style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>請先於上方選擇「{firstDropdownCol}」<br />以載入分析圖表</div>
                    </div>
                );
            }

            const processAndFormatNumber = (rawValue) => {
                const multiplier = comp.multiplier !== undefined ? comp.multiplier : 1;
                let num = rawValue * multiplier; num = Math.round(num * 100000) / 100000;
                const format = comp.numberFormat || 'comma';
                if (format === 'plain') return num.toString();
                if (format === 'comma') return num.toLocaleString('zh-TW');
                if (num === 0) return '0';
                const isNegative = num < 0; let str = Math.abs(num).toString(); let [intPart, decPart] = str.split('.'); let result = ''; const units = ['', '萬', '億', '兆', '京']; let chunks = [];
                while (intPart.length > 0) { chunks.push(intPart.slice(-4)); intPart = intPart.slice(0, -4); }
                for (let i = chunks.length - 1; i >= 0; i--) {
                    let chunkNum = parseInt(chunks[i], 10);
                    if (chunkNum > 0) {
                        let chunkStr = chunkNum.toString();
                        if (format === 'zh-scale-qian' && i === 0 && chunkStr.length === 4) {
                            let qian = chunkStr[0]; let restNum = parseInt(chunkStr.slice(1), 10); chunkStr = restNum === 0 ? `${qian}千` : `${qian}千${restNum}`;
                        }
                        result += chunkStr + units[i];
                    }
                }
                if (isNegative) result = '-' + result; if (decPart) result += '.' + decPart;
                return result || '0';
            };

            const renderMetricOrText = () => {
                if (!filteredData || filteredData.length === 0) return <p style={{ color: '#999' }}>未綁定資料</p>;
                if (comp.type === 'metricCard') {
                    if (!comp.valueColumn) return <p style={{ color: '#999' }}>未綁定數值欄位</p>;
                    let value = comp.aggregation === 'count' ? filteredData.length : filteredData.reduce((sum, row) => sum + (parseFloat(String(row[comp.valueColumn]).replace(/,/g, '')) || 0), 0);
                    const finalDisplayValue = `${comp.prefix || ''}${processAndFormatNumber(value)}${comp.suffix || ''}`;
                    const align = comp.textAlign === 'left' ? 'flex-start' : (comp.textAlign === 'right' ? 'flex-end' : 'center');
                    return (
                        <div className="metric-content" style={{ display: 'flex', justifyContent: align, alignItems: 'center', flex: 1, width: '100%' }}>
                            <div className="metric-value" style={{ color: comp.themeColor || '#086788', fontSize: comp.fontSize || '3.5rem', fontWeight: comp.fontWeight || '900', lineHeight: 1 }}>{finalDisplayValue}</div>
                        </div>
                    );
                }
                if (comp.type === 'textCard') {
                    if (!comp.valueColumn) return <p style={{ color: '#999' }}>未綁定文字欄位</p>;
                    const textContent = filteredData[filteredData.length - 1][comp.valueColumn] || ' (無文字內容) ';
                    const align = comp.textAlign === 'left' ? 'flex-start' : (comp.textAlign === 'right' ? 'flex-end' : 'center');
                    return (
                        <div className="text-content" style={{ overflowY: 'auto', maxHeight: '100%', flex: 1, display: 'flex', alignItems: 'center', justifyContent: align, width: '100%' }}>
                            <p className="text-card-content" style={{ fontSize: comp.fontSize || '1.2rem', fontWeight: comp.fontWeight || 'normal', textAlign: comp.textAlign || 'left', color: comp.themeColor || '#333333', lineHeight: '1.6', margin: 0, whiteSpace: 'pre-wrap', wordBreak: 'break-word' }}>{textContent}</p>
                        </div>
                    );
                }
                return null;
            };

            const renderHtmlLegend = (labels, datasets) => {
                if (comp.type !== 'pieChart' || comp.legendPosition === 'none' || labels.length === 0) return null;
                const isVertical = comp.legendPosition === 'right' || comp.legendPosition === 'left';

                return (
                    <div className="custom-html-legend" style={{
                        display: 'flex', flexWrap: 'wrap', gap: '12px',
                        justifyContent: isVertical ? 'flex-start' : 'center',
                        alignItems: isVertical ? 'flex-start' : 'center',
                        padding: isVertical ? '0 10px' : '10px 0',
                        maxHeight: isVertical ? '100%' : '100px',
                        overflowY: 'auto', overflowX: 'hidden',
                        flexDirection: isVertical ? 'column' : 'row',
                        minWidth: isVertical ? '120px' : 'auto'
                    }}>
                        {labels.map((label, idx) => {
                            const bgColor = datasets.length > 0 ? datasets[0].backgroundColor[idx] : '#ccc';
                            return (
                                <div key={idx} onClick={() => toggleSlice(idx)}
                                    style={{
                                        display: 'flex', alignItems: 'center', gap: '6px', cursor: 'pointer',
                                        opacity: hiddenSlices[idx] ? 0.4 : 1,
                                        fontSize: `${parseInt(comp.axisLabelSize) || 12}px`,
                                        color: comp.axisLabelColor || '#666',
                                        transition: 'opacity 0.2s',
                                        textDecoration: hiddenSlices[idx] ? 'line-through' : 'none'

                    {/* 🌟 圓餅圖 渲染區 */}

                                        : <canvas ref={canvasRef}></canvas>
                                    }

                    {/* 下略... 保留原生檔案下半部下拉選單與按鈕 */}
                    {comp.type === 'dropdown' && (() => {
                        if (!comp.categoryColumn) return <p style={{ color: '#999' }}>未綁定目標欄位</p>;
                        if (isDropdownDisabled) return <select disabled style={{ padding: '10px', fontSize: '1rem', width: '100%', background: '#f0f0f0', color: '#999', border: '1px dashed #ccc' }}><option>請先選擇上一層選單</option></select>;
                        const myIndex = orderedDropdownCols.indexOf(comp.categoryColumn);
                        const upstreamCols = myIndex > 0 ? orderedDropdownCols.slice(0, myIndex) : [];
                        const optionsData = rawData.filter(row => { for (let uCol of upstreamCols) { if (filters[uCol] && row[uCol] !== filters[uCol]) return false; } return true; });
                        const options = [...new Set(optionsData.map(r => r[comp.categoryColumn]))].filter(Boolean).sort();
                        return (

                    {comp.type === 'button' && (

                            '--line-color': comp.lineColor || '#086788',

                        }}>
                            {(!comp.categoryColumn || (!comp.valueColumn && !comp.compareValueColumn)) ? (
                                <p style={{ color: '#999', textAlign: 'center', marginTop: '20px' }}>請在編輯模式綁定「日期」與「標題/內文」欄位</p>

                                if (!row[comp.categoryColumn] && !row[comp.valueColumn] && !row[comp.compareValueColumn]) return null;

                                        <div className="timeline-left">{row[comp.categoryColumn] || ''}</div>
                                        <div className="timeline-right">

                                            {row[comp.valueColumn] && (
                                                <h4 className="timeline-title" style={{ color: comp.titleColor || '#333333', fontSize: comp.titleSize || '1.1rem', fontWeight: comp.titleWeight || '900', textDecoration: 'none' }}>{row[comp.valueColumn]}</h4>
                                            )}
                                            {comp.compareValueColumn && row[comp.compareValueColumn] && (
                                                <p className="timeline-desc" style={{ whiteSpace: 'pre-wrap', wordBreak: 'break-word', color: comp.descColor || '#666666', fontSize: comp.descSize || '0.95rem', fontWeight: comp.descWeight || 'normal', marginTop: row[comp.valueColumn] ? '0' : '3px' }}>{row[comp.compareValueColumn]}</p>
                                            )}
                                            {comp.linkColumn && row[comp.linkColumn] && (
                                                <a href={row[comp.linkColumn]} target="_blank" rel="noreferrer" className="timeline-link-btn">看相關新聞 ↗</a>

                                    </div>

                            })}
                        </div>

                    {comp.type === 'carousel' && (
                        <div className="carousel-container" style={{ '--primary': comp.themeColor || '#086788' }}>
                            {(!comp.categoryColumn && !comp.valueColumn && !comp.imageColumn) ? (
                                <p style={{ color: '#999', textAlign: 'center', marginTop: '20px' }}>請在右側資料面板綁定欄位</p>
                            ) : (
                                <>
                                    <div className="carousel-slide">
                                        {filteredData[currentSlide] && (
                                            <>
                                                {comp.imageColumn && filteredData[currentSlide][comp.imageColumn] && <img src={filteredData[currentSlide][comp.imageColumn]} className="carousel-img" alt="slide" />}
                                                {comp.categoryColumn && filteredData[currentSlide][comp.categoryColumn] && <h3 style={{ color: comp.titleColor || '#333', fontSize: comp.titleSize || '1.3rem', margin: '0 0 10px 0' }}>{filteredData[currentSlide][comp.categoryColumn]}</h3>}
                                                {comp.valueColumn && filteredData[currentSlide][comp.valueColumn] && <p style={{ color: comp.descColor || '#666', fontSize: comp.descSize || '1rem', whiteSpace: 'pre-wrap', wordBreak: 'break-word', margin: 0, lineHeight: '1.6' }}>{filteredData[currentSlide][comp.valueColumn]}</p>}
                                            </>
                                        )}
                                    </div>
                                    {filteredData.length > 1 && (
                                        <>
                                            <div className="carousel-nav">
                                                <button className="carousel-arrow" onClick={(e) => { e.stopPropagation(); setCurrentSlide(prev => prev > 0 ? prev - 1 : filteredData.length - 1); }}>&lt;</button>
                                                <button className="carousel-arrow" onClick={(e) => { e.stopPropagation(); setCurrentSlide(prev => prev < filteredData.length - 1 ? prev + 1 : 0); }}>&gt;</button>
                                            </div>
                                            <div className="carousel-dots">
                                                {filteredData.map((_, i) => <div key={i} className={`carousel-dot ${i === currentSlide ? 'active' : ''}`} onClick={(e) => { e.stopPropagation(); setCurrentSlide(i); }}></div>)}
                                            </div>
                                        </>
                                    )}
                                </>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        function DashboardApp() {
            const params = new URLSearchParams(window.location.search);
            const urlId = params.get('id');
            const [currentScreen, setCurrentScreen] = useState(urlId ? 'editor' : 'home');

            const [recentProjects, setRecentProjects] = useState([]);
            useEffect(() => {
                const saved = JSON.parse(localStorage.getItem('recentDashboards') || '[]');
                setRecentProjects(saved);
            }, []);

            const saveToRecent = (id, title) => {
                const saved = JSON.parse(localStorage.getItem('recentDashboards') || '[]');
                const updated = [{ id, title: title || '未命名專案', date: new Date().toLocaleString('zh-TW') }, ...saved.filter(p => p.id !== id)].slice(0, 20);
                localStorage.setItem('recentDashboards', JSON.stringify(updated));
                setRecentProjects(updated);
            };

            const [viewMode, setViewMode] = useState('builder');
            const [previewDevice, setPreviewDevice] = useState('desktop');
            const [activeTab, setActiveTab] = useState('basic');
            const [isInitialLoading, setIsInitialLoading] = useState(urlId ? true : false);

            const [globalMeta, setGlobalMeta] = useState({
                title: "未命名儀表板", titleColor: "#222222", titleFontSize: "1.8rem", titleFontWeight: "900", titleFontFamily: "", titleAlign: "left",
                lastUpdated: "", dataSources: [{ name: "新增資料來源", url: "" }], watermarkUrl: "", watermarkName: "", watermarkSize: 40, watermarkPosition: "top-right"
            });

            const [sheetSources, setSheetSources] = useState([
                { id: 'ds_' + Date.now(), name: '預設資料表', sheetId: "1Qft9FVm9XtT3SVzbgX1NSduPP0sBR3CdGqiUsm-Mmrs", gid: "612819456" }
            ]);
            const [columnsMap, setColumnsMap] = useState({});
            const [isFetching, setIsFetching] = useState(false);
            const [isPublishing, setIsPublishing] = useState(false);
            const [showPublishModal, setShowPublishModal] = useState(false);
            const [publishedId, setPublishedId] = useState('');

            const [blocks, setBlocks] = useState([
                { i: 'comp_default', x: 0, y: 0, w: 4, h: 3, type: 'metricCard', title: '預算總計', dataSourceId: sheetSources[0].id, categoryCol: '', valueCol: '', aggregation: 'sum', themeColor: '#086788', compareValueCol: '', stackValueCols: [], isPercentageStacked: false, fontSize: '', fontFamily: '', fontWeight: '900', textAlign: 'center' }
            ]);
            const [selectedBlockId, setSelectedBlockId] = useState(null);

            useEffect(() => {
                const loadProject = async () => {
                    if (urlId) {
                        try {
                            if (window.loadFromFirebase) {
                                const data = await window.loadFromFirebase(urlId);
                                if (data) {
                                    setGlobalMeta(data.meta || globalMeta);
                                    if (data.sheetSources) setSheetSources(data.sheetSources);
                                    else if (data.dataSource) setSheetSources([{ id: 'ds_legacy', name: '舊版資料庫', sheetId: data.dataSource.sheetId, gid: data.dataSource.gid }]);

                                    if (data.components) {
                                        const loadedBlocks = data.components.map(c => ({
                                            i: c.id, type: c.type, title: c.title, showTitle: c.showTitle !== false,
                                            dataSourceId: c.dataSourceId || (data.sheetSources ? data.sheetSources[0]?.id : 'ds_legacy'),
                                            categoryCol: c.categoryColumn || '', valueCol: c.valueColumn || '', stackValueCols: c.stackValueColumns || [],
                                            imageCol: c.imageColumn || '', linkCol: c.linkColumn || '', buttonUrl: c.buttonUrl || '', aggregation: c.aggregation || 'sum',
                                            compareValueCol: c.compareValueColumn || '', chartOrientation: c.chartOrientation || 'vertical', themeColor: c.themeColor || '',
                                            timeWidthPercent: c.timeWidthPercent || 20, timelineGap: c.timelineGap || 20, timeColor: c.timeColor || '', lineColor: c.lineColor || '', nodeColor: c.nodeColor || '',
                                            titleColor: c.titleColor || '', titleSize: c.titleSize || '', titleWeight: c.titleWeight || '', descColor: c.descColor || '', descSize: c.descSize || '', descWeight: c.descWeight || '',
                                            prefix: c.prefix || '', suffix: c.suffix || '', numberFormat: c.numberFormat || 'comma', multiplier: c.multiplier !== undefined ? c.multiplier : 1,
                                            fontSize: c.fontSize || '', fontFamily: c.fontFamily || '', fontWeight: c.fontWeight || '', textAlign: c.textAlign || '',
                                            w: c.layout?.desktopCols || 6, h: c.layout?.h || 4, x: c.layout?.x || 0, y: c.layout?.y || Infinity,
                                            legendPosition: c.legendPosition || 'top',

                                            showDataLabels: c.showDataLabels || false,
                                            dataLabelType: c.dataLabelType || 'percentage',
                                            dataLabelColor: c.dataLabelColor || '#ffffff',
                                            pieCustomColors: Array.isArray(c.pieCustomColors) ? c.pieCustomColors : [],
                                        }));
                                        setBlocks(loadedBlocks);
                                    }
                                    setPublishedId(urlId);
                                    saveToRecent(urlId, data.meta?.title);
                                } else {
                                    alert("❌ 找不到此專案紀錄，返回大廳！");
                                    window.location.href = '?';
                                }

                        } catch (err) {
                            console.error(err);
                            alert("❌ 專案讀取失敗！");
                        }
                    }
                    setIsInitialLoading(false);
                };
                if (urlId) setTimeout(loadProject, 500);
            }, [urlId]);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => { setGlobalMeta(prev => ({ ...prev, watermarkUrl: reader.result, watermarkName: file.name })); };
                    reader.readAsDataURL(file);
                }
            };

            const fetchSheetColumns = async () => {
                setIsFetching(true);
                let newColsMap = {};
                try {
                    await Promise.all(sheetSources.map(async (source) => {
                        if (!source.sheetId) return;
                        const url = `https://docs.google.com/spreadsheets/d/${source.sheetId}/gviz/tq?tqx=out:json&headers=1&tq=limit%202&gid=${source.gid || '0'}`;
                        const res = await fetch(url);
                        const text = await res.text();
                        const json = JSON.parse(text.substring(47, text.length - 2));
                        let cols = json.table.cols.map(c => c.label).filter(l => l && l.trim() !== '');
                        if (cols.length === 0 && json.table.rows.length > 0) {
                            cols = json.table.rows[0].c.map(cell => cell ? (cell.f || cell.v || '') : '').filter(l => String(l).trim() !== '');
                        }
                        newColsMap[source.id] = cols;
                    }));
                    setColumnsMap(newColsMap);
                    alert("✅ 成功讀取所有資料庫的表頭欄位！");
                } catch (error) { alert("❌ 讀取失敗，請確認試算表已開放權限。"); }
                setIsFetching(false);
            };

            const handleLayoutChange = (newLayout) => {
                const updatedBlocks = blocks.map(block => {
                    const layoutItem = newLayout.find(l => l.i === block.i);
                    return layoutItem ? { ...block, x: layoutItem.x, y: layoutItem.y, w: layoutItem.w, h: layoutItem.h } : block;
                });
                setBlocks(updatedBlocks);
            };

            const addBlock = (type, title, defaultW, defaultH) => {
                const newId = 'comp_' + Date.now();
                setBlocks(prev => [...prev, { i: newId, dataSourceId: sheetSources.length > 0 ? sheetSources[0].id : '', x: 0, y: Infinity, w: defaultW, h: defaultH, type: type, title: title, categoryCol: '', valueCol: '', aggregation: type === 'textCard' ? 'first' : 'sum', chartOrientation: 'vertical', themeColor: type === 'textCard' ? '#333333' : '#086788', compareValueCol: '', stackValueCols: [], isPercentageStacked: false, fontSize: '', fontFamily: '', fontWeight: type === 'textCard' ? 'normal' : '900', textAlign: type === 'textCard' ? 'left' : 'center' }]);
                setSelectedBlockId(newId);
            };

            const removeBlock = (idToRemove) => {
                setBlocks(prev => prev.filter(block => block.i !== idToRemove));
                if (selectedBlockId === idToRemove) setSelectedBlockId(null);
            };

            const updateBlockProperty = (id, key, value) => {
                setBlocks(prev => prev.map(block => block.i === id ? { ...block, [key]: value } : block));
            };

            const updateBlockLayout = (id, key, value) => {
                const numValue = parseInt(value, 10);
                if (isNaN(numValue) || numValue < 1) return;
                setBlocks(prev => prev.map(block => block.i === id ? { ...block, [key]: numValue } : block));
            };

            const updateGlobalMeta = (key, value) => { setGlobalMeta(prev => ({ ...prev, [key]: value })); }
            const currentSelectedBlock = blocks.find(b => b.i === selectedBlockId);

            const finalJSON = {
                meta: globalMeta,
                sheetSources: sheetSources,
                components: blocks.map(b => ({
                    id: b.i,
                    type: b.type,
                    title: b.title,
                    dataSourceId: b.dataSourceId || (sheetSources.length > 0 ? sheetSources[0].id : ''),
                    showTitle: b.showTitle !== false,
                    legendPosition: b.legendPosition || 'top',

                    categoryColumn: b.categoryCol || null,
                    multiValueCols: (b.type === 'barChart' || b.type === 'stackedBarChart') ? (b.multiValueCols || b.stackValueCols || [b.valueCol, b.compareValueCol].filter(Boolean)) : [],
                    valueColumn: (b.type !== 'barChart' && b.type !== 'stackedBarChart') ? (b.valueCol || null) : null,
                    compareValueColumn: b.compareValueCol || null,
                    imageColumn: b.imageCol || null,
                    linkColumn: b.linkCol || null,
                    buttonUrl: b.buttonUrl || null,

                    aggregation: b.aggregation || 'sum',
                    sortBy: b.sortBy || 'sheet',

                    chartOrientation: b.chartOrientation || 'vertical',
                    themeColor: b.themeColor || '',
                    isPercentageStacked: b.isPercentageStacked || false,
                    yAxisMin: b.yAxisMin,
                    stepSize: b.stepSize,
                    showAxisUnit: b.showAxisUnit || false,
                    xAxisUnit: b.xAxisUnit || '',
                    yAxisUnit: b.yAxisUnit || '',
                    customColors: Array.isArray(b.customColors) ? b.customColors : [],
                    axisLabelColor: b.axisLabelColor || '#666666',
                    axisGridColor: b.axisGridColor || '#e0e0e0',
                    axisLabelSize: b.axisLabelSize || '12',

                    timeWidthPercent: b.timeWidthPercent || 20,
                    timelineGap: b.timelineGap || 20,
                    timeColor: b.timeColor || '',
                    lineColor: b.lineColor || '',
                    nodeColor: b.nodeColor || '',
                    titleColor: b.titleColor || '',
                    titleSize: b.titleSize || '',
                    titleWeight: b.titleWeight || '',
                    descColor: b.descColor || '',
                    descSize: b.descSize || '',
                    descWeight: b.descWeight || '',

                    prefix: b.prefix || '',
                    suffix: b.suffix || '',
                    numberFormat: b.numberFormat || 'comma',
                    multiplier: b.multiplier !== undefined ? b.multiplier : 1,

                    fontFamily: b.fontFamily || null,
                    fontWeight: b.fontWeight || null,
                    textAlign: b.textAlign || null,

                    layout: { desktopCols: b.w, h: b.h, x: b.x, y: b.y },
                    pieStyle: b.pieStyle || 'doughnut',
                    pieRotation: b.pieRotation || 0,
                    showDataLabels: b.showDataLabels || false,
                    dataLabelType: b.dataLabelType || 'percentage',
                    dataLabelColor: b.dataLabelColor || '#ffffff',
                    pieCustomColors: Array.isArray(b.pieCustomColors) ? b.pieCustomColors : [],
                }))
            };

            const handlePublish = async () => {
                setIsPublishing(true);
                try {
                    if (publishedId && window.updateToFirebase) {
                        await window.updateToFirebase(publishedId, finalJSON);

                    alert("❌ 發布失敗！詳細錯誤：" + error.message);

            const handleCopy = () => {
                const iframeCode = `<iframe \n  src="https://你的帳號.github.io/你的儲存庫/viewer.html?id=${publishedId}" \n  width="100%" \n  height="800px" \n  frameborder="0" \n  scrolling="no"\n></iframe>`;
                navigator.clipboard.writeText(iframeCode);
