            if (currentScreen === 'home') {
                return (
                    <div style={{ padding: '60px 20px', maxWidth: '900px', margin: '0 auto', fontFamily: '"Noto Sans TC", sans-serif' }}>
                        <h1 style={{ color: '#086788', textAlign: 'center', fontSize: '2.5rem', margin: '0 0 10px 0' }}>📊 儀表板生成器</h1>
                        <p style={{ textAlign: 'center', color: '#666', fontSize: '1.1rem', marginBottom: '40px' }}>請選擇建立新專案，或接續編輯先前的專案。</p>

                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px', marginBottom: '40px' }}>
                            <div onClick={() => setCurrentScreen('editor')} style={{ background: '#fff', border: '2px dashed #086788', borderRadius: '12px', padding: '40px 20px', textAlign: 'center', cursor: 'pointer', boxShadow: '0 4px 10px rgba(0,0,0,0.05)', transition: 'transform 0.2s' }} onMouseOver={(e) => e.currentTarget.style.transform = 'translateY(-5px)'} onMouseOut={(e) => e.currentTarget.style.transform = 'translateY(0)'}>
                                <div style={{ fontSize: '3rem', marginBottom: '15px' }}>✨</div>
                                <h2 style={{ color: '#086788', margin: '0 0 10px 0' }}>建立新專案</h2>
                                <p style={{ color: '#666', margin: 0 }}>從一張空白畫布開始設計</p>
                            </div>

                            <div onClick={() => {
                                const id = prompt("請輸入專案 ID：");
                                if (id && id.trim() !== "") window.location.href = `?id=${id.trim()}`;
                            }} style={{ background: '#fff', border: '2px solid #ccc', borderRadius: '12px', padding: '40px 20px', textAlign: 'center', cursor: 'pointer', boxShadow: '0 4px 10px rgba(0,0,0,0.05)', transition: 'transform 0.2s' }} onMouseOver={(e) => e.currentTarget.style.transform = 'translateY(-5px)'} onMouseOut={(e) => e.currentTarget.style.transform = 'translateY(0)'}>
                                <div style={{ fontSize: '3rem', marginBottom: '15px' }}>📁</div>
                                <h2 style={{ color: '#555', margin: '0 0 10px 0' }}>輸入專案 ID</h2>
                                <p style={{ color: '#666', margin: 0 }}>手動輸入 ID 來讀取雲端專案</p>
                            </div>
                        </div>

                        <div style={{ background: '#fff', borderRadius: '12px', padding: '30px', boxShadow: '0 4px 10px rgba(0,0,0,0.05)' }}>
                            <h3 style={{ marginTop: 0, borderBottom: '2px solid #eee', paddingBottom: '15px', color: '#333' }}>🕒 最近編輯紀錄 (本機存檔)</h3>
                            {recentProjects.length === 0 ? (
                                <p style={{ color: '#999', textAlign: 'center', padding: '30px 0', margin: 0 }}>尚無編輯紀錄，趕快建立一個吧！</p>
                            ) : (
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '10px', maxHeight: '400px', overflowY: 'auto' }}>
                                    {recentProjects.map(p => (
                                        <div key={p.id} onClick={() => window.location.href = `?id=${p.id}`} style={{ background: '#f9f9f9', padding: '15px 20px', borderRadius: '8px', border: '1px solid #eee', display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer', transition: '0.2s' }} onMouseOver={(e) => e.currentTarget.style.background = '#f0f8fa'} onMouseOut={(e) => e.currentTarget.style.background = '#f9f9f9'}>
                                            <div>
                                                <div style={{ fontSize: '1.2rem', color: '#086788', fontWeight: 'bold', marginBottom: '5px' }}>{p.title}</div>
                                                <div style={{ color: '#888', fontSize: '0.85rem' }}>ID: {p.id}</div>
                                            </div>
                                            <div style={{ color: '#999', fontSize: '0.9rem', textAlign: 'right' }}>
                                                <span style={{ display: 'block', marginBottom: '3px' }}>上次更新</span>
                                                {p.date}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (isInitialLoading) {
                return (
                    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100vh', background: '#f5f5f5', color: '#086788' }}>
                        <h2>⏳ 專案環境載入中...</h2>
                        <p style={{ color: '#666' }}>正為您佈署編輯器</p>
                    </div>
                );
            }

            const isChartType = currentSelectedBlock && ['barChart', 'pieChart', 'lineChart', 'stackedBarChart'].includes(currentSelectedBlock.type);
            const currentDataSourceId = currentSelectedBlock ? (currentSelectedBlock.dataSourceId || (sheetSources.length > 0 ? sheetSources[0].id : '')) : '';
            const availableColumns = columnsMap[currentDataSourceId] || [];

            return (
                <div>
                    <div className="top-nav">
                        <div style={{ display: 'flex', alignItems: 'center', gap: '15px' }}>
                            <button onClick={() => {
                                if (window.confirm('您確定要返回大廳嗎？\n\n⚠️ 提醒您：若尚未點擊「🚀 發布儀表板」，剛剛修改的進度將會遺失喔！')) {
                                    window.location.href = '?';
                                }
                            }} style={{
                                background: '#f5f5f5', border: '1px solid #ccc', color: '#333',
                                fontSize: '0.95rem', cursor: 'pointer', padding: '8px 15px',
                                borderRadius: '8px', display: 'flex', alignItems: 'center', gap: '6px',
                                fontWeight: 'bold', transition: '0.2s'
                            }}
                                onMouseOver={(e) => e.currentTarget.style.background = '#e0e0e0'}
                                onMouseOut={(e) => e.currentTarget.style.background = '#f5f5f5'}>
                                🏠 回大廳
                            </button>
                            <h2 style={{ margin: 0, color: '#086788' }}>儀表板生成器 (Builder)</h2>
                        </div>

                        <div style={{ display: 'flex', gap: '20px', alignItems: 'center' }}>
                            {viewMode === 'preview' && (
                                <div className="device-toggle">
                                    <button className={previewDevice === 'desktop' ? 'active' : ''} onClick={() => setPreviewDevice('desktop')}>💻 電腦版</button>
                                    <button className={previewDevice === 'mobile' ? 'active' : ''} onClick={() => setPreviewDevice('mobile')}>📱 手機版</button>
                                </div>
                            )}
                            <div className="mode-toggle">
                                <button className={viewMode === 'builder' ? 'active' : ''} onClick={() => setViewMode('builder')}>✏️ 編輯排版</button>
                                <button className={viewMode === 'preview' ? 'active' : ''} onClick={() => setViewMode('preview')}>👁️ 真實預覽</button>
                            </div>
                            <button className="publish-btn" onClick={handlePublish} disabled={isPublishing}>
                                {isPublishing ? '發布存檔中...' : '🚀 發布儀表板'}
                            </button>
                        </div>
                    </div>

                    {viewMode === 'builder' && (
                        <div className="builder-container">
                            <div className="toolbar-area">
                                <h3 style={{ marginTop: 0, marginBottom: '5px' }}>🛠️ 積木工具</h3>

                                <div style={{ fontSize: '0.85rem', fontWeight: 'bold', color: '#999', marginTop: '10px', marginBottom: '5px' }}>🎛️ 控制器</div>
                                <button className="add-btn" onClick={() => addBlock('dropdown', '下拉選單', 12, 2)} style={{ background: '#F0C808', color: '#333' }}>+ 下拉選單</button>
                                <button className="add-btn" onClick={() => addBlock('button', '🔗 動作按鈕', 4, 2)} style={{ background: '#2ECC71', color: '#000' }}>+ 動作按鈕</button>

                                <div style={{ fontSize: '0.85rem', fontWeight: 'bold', color: '#999', marginTop: '15px', marginBottom: '5px' }}>📇 卡片</div>
                                <button className="add-btn" onClick={() => addBlock('textCard', '📝 文字區塊', 12, 3)} style={{ background: '#34495E' }}>+ 文字區塊</button>
                                <button className="add-btn" onClick={() => addBlock('metricCard', '🔢 數據卡片', 4, 3)}>+ 數據卡片</button>
                                <button className="add-btn" onClick={() => addBlock('carousel', '🎠 內容輪播', 6, 6)} style={{ background: '#3498DB' }}>+ 內容輪播</button>

                                <div style={{ fontSize: '0.85rem', fontWeight: 'bold', color: '#999', marginTop: '15px', marginBottom: '5px' }}>📊 圖表</div>
                                <button className="add-btn" onClick={() => addBlock('barChart', '長條圖', 6, 5)}>+ 長條圖</button>
                                <button className="add-btn" onClick={() => addBlock('pieChart', '圓餅圖', 6, 5)}>+ 圓餅圖</button>
                                <button className="add-btn" onClick={() => addBlock('lineChart', '時間軸趨勢', 8, 5)} style={{ background: '#E74C3C' }}>+ 時間趨勢線</button>
                                <button className="add-btn" onClick={() => addBlock('stackedBarChart', '堆疊直條圖', 12, 8)} style={{ background: '#E67E22' }}>+ 堆疊直條圖</button>
                                <button className="add-btn" onClick={() => addBlock('timeline', '📅 新聞時間軸', 12, 10)} style={{ background: '#8E44AD' }}>+ 新聞時間軸</button>
                            </div>

                            <div className="canvas-area">
                                <div className="grid-bg" onMouseDown={(e) => { if (!e.target.closest('.grid-item')) setSelectedBlockId(null); }}>
                                    <ResponsiveRGL layout={blocks} cols={12} rowHeight={30} margin={[15, 15]} onLayoutChange={handleLayoutChange} draggableCancel=".delete-btn" style={{ minHeight: '100%' }}>
                                        {blocks.map(block => (
                                            <div key={block.i}>
                                                <div className={`grid-item ${selectedBlockId === block.i ? 'selected' : ''}`} onMouseDown={() => setSelectedBlockId(block.i)}>
                                                    <button className="delete-btn" onMouseDown={(e) => { e.stopPropagation(); removeBlock(block.i); }}>✕</button>
                                                    <span style={{ fontSize: '1.2rem' }}>{block.title || '(無標題)'}</span>
                                                    <div className="type-badge">{
                                                        block.type === 'stackedBarChart' ? '堆疊圖' :
                                                            block.type === 'lineChart' ? '折線圖' :
                                                                block.type === 'textCard' ? '文字區塊' : block.type
                                                    }</div>
                                                    <div className="size-badge">{block.w} / 12 格</div>
                                                </div>
                                            </div>
                                        ))}
                                    </ResponsiveRGL>
                                </div>
                            </div>

                            <div className="right-panel">
                                <div className="property-area">
                                    {currentSelectedBlock ? (
                                        <div>
                                            <h3 style={{ marginTop: 0, marginBottom: '15px', color: '#333' }}>⚙️ {currentSelectedBlock.title || '積木設定'}</h3>

                                            <div className="panel-tabs">
                                                <div className={`panel-tab ${activeTab === 'basic' ? 'active' : ''}`} onClick={() => setActiveTab('basic')}>📐 基本</div>
                                                <div className={`panel-tab ${activeTab === 'data' ? 'active' : ''}`} onClick={() => setActiveTab('data')}>📊 資料</div>
                                                <div className={`panel-tab ${activeTab === 'style' ? 'active' : ''}`} onClick={() => setActiveTab('style')}>🎨 樣式</div>
                                            </div>

                                            {activeTab === 'basic' && (
                                                <div className="panel-content">
                                                    <div className="form-group" style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '10px' }}>
                                                        <input type="checkbox" id="toggleTitle" checked={currentSelectedBlock.showTitle !== false} onChange={(e) => updateBlockProperty(currentSelectedBlock.i, 'showTitle', e.target.checked)} />
                                                        <label htmlFor="toggleTitle" style={{ margin: 0, cursor: 'pointer', fontWeight: 'bold' }}>顯示積木主標題</label>
                                                    </div>
                                                    {currentSelectedBlock.showTitle !== false && (
                                                        <div className="form-group" style={{ marginTop: '-5px' }}>
                                                            <input type="text" value={currentSelectedBlock.title || ''} onChange={(e) => updateBlockProperty(currentSelectedBlock.i, 'title', e.target.value)} placeholder="請輸入標題 (例如：本月營收)" />
                                                        </div>
                                                    )}
                                                    <div style={{ display: 'flex', gap: '10px', marginTop: '15px' }}>
                                                        <div className="form-group" style={{ flex: 1 }}>
                                                            <label>寬度 (1~12格)</label>
                                                            <input type="number" min="1" max="12" value={currentSelectedBlock.w} onChange={(e) => updateBlockLayout(currentSelectedBlock.i, 'w', e.target.value)} />
                                                        </div>
                                                        <div className="form-group" style={{ flex: 1 }}>
                                                            <label>編輯器高度 (格)</label>
                                                            <input type="number" min="1" value={currentSelectedBlock.h} onChange={(e) => updateBlockLayout(currentSelectedBlock.i, 'h', e.target.value)} />
                                                        </div>
                                                    </div>
                                                    <div style={{ fontSize: '0.85rem', color: '#086788', background: '#f0f8fa', padding: '10px', borderRadius: '6px', marginBottom: '15px', lineHeight: '1.5' }}>
                                                        💡 <b>無捲軸的最佳高度建議：</b><br />
                                                        {currentSelectedBlock.type === 'dropdown' ? (currentSelectedBlock.showTitle !== false ? '👉 3 格 (含標題)' : '👉 2 格 (無標題剛好)') :
                                                            currentSelectedBlock.type === 'button' ? '👉 2 格' :
                                                                currentSelectedBlock.type === 'metricCard' ? (currentSelectedBlock.showTitle !== false ? '👉 4 格' : '👉 3 格') :
                                                                    isChartType ? '👉 至少 8 ~ 10 格 (讓圖表有空間伸展)' :
                                                                        '👉 視文字或事件內容多寡而定'}
                                                    </div>
                                                    <button className="delete-panel-btn" onClick={() => removeBlock(currentSelectedBlock.i)}>🗑️ 刪除此積木</button>
                                                </div>
                                            )}

                                            {activeTab === 'data' && (
                                                <div className="panel-content">

                                                    {/* 🗄️ 選擇資料來源 */}
                                                    {currentSelectedBlock.type !== 'button' && sheetSources.length > 0 && (
                                                        <div className="form-group" style={{ background: '#f0f8fa', padding: '10px', borderRadius: '6px', border: '1px solid #cce4ec', marginBottom: '15px' }}>
                                                            <label>🗄️ 選擇此積木的資料來源</label>
                                                            <select value={currentDataSourceId} onChange={(e) => updateBlockProperty(currentSelectedBlock.i, 'dataSourceId', e.target.value)} style={{ marginTop: '5px' }}>
                                                                {sheetSources.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                                            </select>
                                                            <div style={{ fontSize: '0.8rem', color: '#666', marginTop: '5px' }}>切換來源後，請重新綁定下方欄位。</div>
                                                        </div>
                                                    )}

                                                    {/* 🔘 動作按鈕 */}
                                                    {currentSelectedBlock.type === 'button' && (
                                                        <div className="form-group">
                                                            <label>按鈕點擊連結 (URL)</label>
                                                            <input type="text" value={currentSelectedBlock.buttonUrl || ''} onChange={(e) => updateBlockProperty(currentSelectedBlock.i, 'buttonUrl', e.target.value)} placeholder="https://..." />
                                                        </div>
                                                    )}

                                                    {/* 🔗 資料欄位綁定區 */}
                                                    {currentSelectedBlock.type !== 'button' && availableColumns.length === 0 ? (
                                                        <div className="notice-box">請先點擊背景進入「全局設定」，讀取表單資料後才能綁定欄位。</div>
                                                    ) : currentSelectedBlock.type !== 'button' && (
                                                        <>
                                                            {/* 分類/日期 X軸 */}
                                                            {(isChartType || currentSelectedBlock.type === 'timeline' || currentSelectedBlock.type === 'carousel') && (
                                                                <div className="form-group">
                                                                    <label>{currentSelectedBlock.type === 'timeline' || currentSelectedBlock.type === 'carousel' ? '日期/大標題欄位' : '分類欄位 (X軸)'}</label>
                                                                    <select value={currentSelectedBlock.categoryCol} onChange={(e) => updateBlockProperty(currentSelectedBlock.i, 'categoryCol', e.target.value)}>
                                                                        <option value="">請選擇...</option>
                                                                        {availableColumns.map(col => <option key={col} value={col}>{col}</option>)}
                                                                    </select>
                                                                </div>
                                                            )}

                                                            {/* 下拉選單專屬 */}
                                                            {currentSelectedBlock.type === 'dropdown' && (
                                                                <div className="form-group">
                                                                    <label>過濾目標欄位</label>
                                                                    <select value={currentSelectedBlock.categoryCol} onChange={(e) => updateBlockProperty(currentSelectedBlock.i, 'categoryCol', e.target.value)}>
                                                                        <option value="">請選擇要過濾的欄位...</option>
                                                                        {availableColumns.map(col => <option key={col} value={col}>{col}</option>)}
                                                                    </select>
                                                                </div>
                                                            )}

                                                            {/* 輪播圖片專屬 */}
                                                            {currentSelectedBlock.type === 'carousel' && (
                                                                <div className="form-group" style={{ background: '#f0f8fa', padding: '10px', borderRadius: '6px', border: '1px solid #cce4ec', marginTop: '5px' }}>
                                                                    <label>🖼️ 圖片網址欄位 (選填)</label>
                                                                    <select value={currentSelectedBlock.imageCol || ''} onChange={(e) => updateBlockProperty(currentSelectedBlock.i, 'imageCol', e.target.value)} style={{ marginTop: '5px' }}>
                                                                        <option value="">無 (純文字輪播)</option>
                                                                        {availableColumns.map(col => <option key={col} value={col}>{col}</option>)}
                                                                    </select>
                                                                </div>
                                                            )}

                                                            {currentSelectedBlock.type !== 'dropdown' && (
                                                                <>
                                                                    {/* 📊 長條圖/堆疊圖 多欄位選擇 */}
                                                                    {(currentSelectedBlock.type === 'barChart' || currentSelectedBlock.type === 'stackedBarChart') ? (
                                                                        <div className="form-group">
                                                                            <label>長條圖數值欄位 (可多選)</label>
                                                                            {((currentSelectedBlock.multiValueCols || currentSelectedBlock.stackValueCols) || [currentSelectedBlock.valueCol, currentSelectedBlock.compareValueCol].filter(Boolean)).map((col, index) => (
                                                                                <div key={index} style={{ display: 'flex', gap: '5px', marginBottom: '5px' }}>
                                                                                    <select value={col} onChange={(e) => {
                                                                                        const newCols = [...((currentSelectedBlock.multiValueCols || currentSelectedBlock.stackValueCols) || [])];
                                                                                        newCols[index] = e.target.value;
                                                                                        updateBlockProperty(currentSelectedBlock.i, 'multiValueCols', newCols);
                                                                                    }}>
                                                                                        <option value="">請選擇...</option>
                                                                                        {availableColumns.map(availableCol => <option key={availableCol} value={availableCol}>{availableCol}</option>)}
                                                                                    </select>
                                                                                    <button onClick={() => {
                                                                                        const newCols = ((currentSelectedBlock.multiValueCols || currentSelectedBlock.stackValueCols) || []).filter((_, i) => i !== index);
                                                                                        updateBlockProperty(currentSelectedBlock.i, 'multiValueCols', newCols);
                                                                                    }} style={{ padding: '5px' }}>✕</button>
                                                                                </div>
                                                                            ))}
                                                                            <button className="reset-filter-btn" onClick={() => {
                                                                                const updatedCols = [...((currentSelectedBlock.multiValueCols || currentSelectedBlock.stackValueCols) || []), ''];
                                                                                updateBlockProperty(currentSelectedBlock.i, 'multiValueCols', updatedCols);
                                                                            }}>+ 添加數值欄位</button>
                                                                        </div>
                                                                    ) : (
                                                                        /* 其他積木的單一 Y 軸 / 內文欄位 */
                                                                        <div className="form-group">
                                                                            <label>
                                                                                {currentSelectedBlock.type === 'textCard' ? '文字來源欄位' :
                                                                                    currentSelectedBlock.type === 'timeline' || currentSelectedBlock.type === 'carousel' ? '事件內文欄位' : '數值欄位 (Y軸)'}
                                                                            </label>
                                                                            <select value={currentSelectedBlock.valueCol} onChange={(e) => updateBlockProperty(currentSelectedBlock.i, 'valueCol', e.target.value)}>
                                                                                <option value="">請選擇...</option>
                                                                                {availableColumns.map(col => <option key={col} value={col}>{col}</option>)}
                                                                            </select>
                                                                        </div>
                                                                    )}

                                                                    {/* 比較與附屬說明欄位 (折線、時間軸、數據卡) */}
                                                                    {currentSelectedBlock.type !== 'textCard' && currentSelectedBlock.type !== 'pieChart' && currentSelectedBlock.type !== 'stackedBarChart' && currentSelectedBlock.type !== 'barChart' && currentSelectedBlock.type !== 'dropdown' && currentSelectedBlock.type !== 'carousel' && (
                                                                        <div className="form-group">
                                                                            <label>{currentSelectedBlock.type === 'timeline' ? '事件附屬說明 (選填)' : '比較數值欄位 (選填)'}</label>
                                                                            <select value={currentSelectedBlock.compareValueCol || ''} onChange={(e) => updateBlockProperty(currentSelectedBlock.i, 'compareValueCol', e.target.value)}>
                                                                                <option value="">無</option>
                                                                                {availableColumns.map(col => <option key={col} value={col}>{col}</option>)}
                                                                            </select>
                                                                        </div>
                                                                    )}

                                                                    {/* 🔗 時間軸專屬：超連結 */}
                                                                    {currentSelectedBlock.type === 'timeline' && (
                                                                        <div className="form-group" style={{ background: '#f0f8fa', padding: '10px', borderRadius: '6px', border: '1px solid #cce4ec', marginTop: '5px' }}>
                                                                            <label>🔗 事件連結網址欄位 (選填)</label>
                                                                            <select value={currentSelectedBlock.linkCol || ''} onChange={(e) => updateBlockProperty(currentSelectedBlock.i, 'linkCol', e.target.value)} style={{ marginTop: '5px' }}>
                                                                                <option value="">無 (不加連結)</option>
                                                                                {availableColumns.map(col => <option key={col} value={col}>{col}</option>)}
                                                                            </select>
                                                                            <div style={{ fontSize: '0.8rem', color: '#666', marginTop: '5px' }}>若綁定，事件底部將出現按鈕。</div>
                                                                        </div>
                                                                    )}

                                                                    {/* 排序方式 */}
                                                                    {currentSelectedBlock.type !== 'textCard' && currentSelectedBlock.type !== 'timeline' && currentSelectedBlock.type !== 'carousel' && currentSelectedBlock.type !== 'dropdown' && (
                                                                        <div className="form-group" style={{ background: '#f0f8fa', padding: '10px', borderRadius: '6px', border: '1px solid #cce4ec', marginBottom: '15px', marginTop: '15px' }}>
                                                                            <label>📊 圖表排序方式</label>
                                                                            <select value={currentSelectedBlock.sortBy || 'sheet'} onChange={(e) => updateBlockProperty(currentSelectedBlock.i, 'sortBy', e.target.value)} style={{ marginTop: '5px' }}>
                                                                                <option value="sheet">依 Google Sheet 原始順序</option>
                                                                                <option value="value_desc">依數值總和 (由大到小) 💡推薦</option>
                                                                                <option value="value_asc">依數值總和 (由小到大)</option>
                                                                                <option value="category_asc">依名稱筆畫/字母排序</option>
                                                                            </select>
                                                                        </div>
                                                                    )}

                                                                    {/* 計算方式 */}
                                                                    {currentSelectedBlock.type !== 'textCard' && currentSelectedBlock.type !== 'timeline' && currentSelectedBlock.type !== 'carousel' && (
                                                                        <div className="form-group">
                                                                            <label>資料計算方式</label>
                                                                            <select value={currentSelectedBlock.aggregation} onChange={(e) => updateBlockProperty(currentSelectedBlock.i, 'aggregation', e.target.value)}>
                                                                                <option value="sum">加總金額/數值 (Sum)</option>
                                                                                <option value="count">計算筆數 (Count)</option>
                                                                            </select>

                                            <div className="form-group" style={{ marginTop: '10px' }}>
                                                <label>最後更新時間 (顯示於左下角)</label>
                                                <input type="text" value={globalMeta.lastUpdated} onChange={(e) => updateGlobalMeta('lastUpdated', e.target.value)} placeholder="例如：2023/03/27 22:23" />
                                            </div>

                                            {/* 🌟 魔王升級：跨表資料源管理 */}
                                            <h4 style={{ marginTop: '30px', marginBottom: '10px', color: '#086788' }}>📚 跨表資料庫 (BI 引擎)</h4>
                                            <div style={{ fontSize: '0.85rem', color: '#666', marginBottom: '15px' }}>
                                                可新增多個 Google Sheet。圖表若綁定「相同名稱」的過濾欄位，即可啟動跨表連動！
                                            </div>
                                            {sheetSources.map((source, index) => (
                                                <div key={source.id} style={{ background: '#f9f9f9', padding: '15px', borderRadius: '8px', marginBottom: '10px', border: '1px solid #eee' }}>
                                                    <div className="form-group" style={{ marginBottom: '10px' }}>
                                                        <label>資料源名稱</label>
                                                        <div style={{ display: 'flex', gap: '5px' }}>
                                                            <input type="text" style={{ flex: 1, fontWeight: 'bold', color: '#086788' }} value={source.name} onChange={(e) => {
                                                                const newSources = [...sheetSources];
                                                                newSources[index].name = e.target.value;
                                                                setSheetSources(newSources);
                                                            }} placeholder="例如：113年預算表" />
                                                            {sheetSources.length > 1 && (
                                                                <button className="action-btn" style={{ margin: 0, background: '#E74C3C', color: 'white', padding: '0 10px' }} onClick={() => {
                                                                    setSheetSources(sheetSources.filter(s => s.id !== source.id));
                                                                }}>刪除</button>
                                                            )}
                                                        </div>
                                                    </div>
                                                    <div className="form-group">
                                                        <label>Google Sheet ID</label>
                                                        <input type="text" value={source.sheetId} onChange={(e) => {
                                                            const newSources = [...sheetSources];
                                                            newSources[index].sheetId = e.target.value;
                                                            setSheetSources(newSources);
                                                        }} />
                                                    </div>
                                                    <div className="form-group">
                                                        <label>表單 GID</label>
                                                        <input type="text" value={source.gid} onChange={(e) => {
                                                            const newSources = [...sheetSources];
                                                            newSources[index].gid = e.target.value;
                                                            setSheetSources(newSources);
                                                        }} />
                                                    </div>
                                                </div>
                                            ))}
                                            <button className="reset-filter-btn" onClick={() => {
                                                setSheetSources([...sheetSources, { id: 'ds_' + Date.now(), name: '新資料表', sheetId: '', gid: '0' }]);
                                            }}>+ 新增一張表單</button>

                                            <button className="action-btn" onClick={fetchSheetColumns} disabled={isFetching} style={{ width: '100%', padding: '12px', marginTop: '10px' }}>
                                                {isFetching ? "讀取中..." : "📥 讀取所有表單欄位"}
                                            </button>

                                            <h4 style={{ marginTop: '30px', marginBottom: '10px', color: '#086788' }}>🔗 頁尾來源連結設定</h4>
                                            {(globalMeta.dataSources || []).map((source, index) => (
                                                <div key={index} style={{ background: '#f9f9f9', padding: '10px', borderRadius: '8px', marginBottom: '10px', border: '1px solid #eee' }}>
                                                    <div className="form-group" style={{ marginBottom: '10px' }}>
                                                        <label>連結名稱 {index + 1}</label>
                                                        <div style={{ display: 'flex', gap: '5px' }}>
                                                            <input type="text" style={{ flex: 1 }} value={source.name} onChange={(e) => {
                                                                const newSources = [...globalMeta.dataSources];
                                                                newSources[index].name = e.target.value;
                                                                updateGlobalMeta('dataSources', newSources);
                                                            }} placeholder="例如：主計處" />
                                                            <button className="action-btn" style={{ margin: 0, background: '#E74C3C', color: 'white', padding: '0 10px' }} onClick={() => {
                                                                const newSources = globalMeta.dataSources.filter((_, i) => i !== index);
                                                                updateGlobalMeta('dataSources', newSources);
                                                            }}>✕</button>
                                                        </div>
                                                    </div>
                                                    <div className="form-group" style={{ marginBottom: 0 }}>
                                                        <label>網址連結 (選填)</label>
                                                        <input type="text" value={source.url} onChange={(e) => {
                                                            const newSources = [...globalMeta.dataSources];
                                                            newSources[index].url = e.target.value;
                                                            updateGlobalMeta('dataSources', newSources);
                                                        }} placeholder="https://..." />
                                                    </div>
                                                </div>
                                            ))}
                                            <button className="reset-filter-btn" onClick={() => {
                                                const newSources = [...(globalMeta.dataSources || []), { name: '', url: '' }];
                                                updateGlobalMeta('dataSources', newSources);
                                            }}>+ 新增頁尾連結</button>

                                            <h4 style={{ marginTop: '30px', marginBottom: '10px', color: '#086788' }}>🖼️ 浮水印設定</h4>
                                            <div className="form-group">
                                                <label>上傳浮水印圖片</label>
                                                {globalMeta.watermarkUrl ? (
                                                    <div style={{ background: '#f0f8fa', padding: '15px', borderRadius: '8px', border: '1px solid #cce4ec', display: 'flex', flexDirection: 'column', gap: '10px' }}>
                                                        <div style={{ fontSize: '0.85rem', color: '#086788', fontWeight: 'bold', wordBreak: 'break-all' }}>
                                                            ✅ 已上傳：{globalMeta.watermarkName || '自訂圖片'}
                                                        </div>
                                                        <div style={{ background: '#fff', padding: '5px', borderRadius: '4px', border: '1px dashed #ccc', textAlign: 'center' }}>
                                                            <img src={globalMeta.watermarkUrl} alt="預覽" style={{ maxHeight: '40px', maxWidth: '100%', objectFit: 'contain' }} />
                                                        </div>
                                                        <div style={{ display: 'flex', gap: '10px', marginTop: '5px' }}>
                                                            <label style={{ flex: 1, textAlign: 'center', background: '#086788', color: 'white', padding: '6px', borderRadius: '6px', cursor: 'pointer', fontSize: '0.85rem', fontWeight: 'bold' }}>
                                                                🔄 重新上傳
                                                                <input type="file" accept="image/*" onChange={handleImageUpload} style={{ display: 'none' }} />
                                                            </label>
                                                            <button className="action-btn" style={{ flex: 1, background: '#E74C3C', color: 'white', margin: 0, padding: '6px', fontSize: '0.85rem' }} onClick={() => setGlobalMeta(prev => ({ ...prev, watermarkUrl: '', watermarkName: '' }))}>
                                                                🗑️ 移除
                                                            </button>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <input type="file" accept="image/*" onChange={handleImageUpload} style={{ padding: '5px 0', border: 'none' }} />
                                                )}
                                            </div>

                                            {globalMeta.watermarkUrl && (
                                                <>
                                                    <div className="form-group">
                                                        <label>浮水印位置</label>
                                                        <select value={globalMeta.watermarkPosition || 'top-right'} onChange={(e) => updateGlobalMeta('watermarkPosition', e.target.value)}>
                                                            <option value="top-right">右上角 (主標題旁)</option>
                                                            <option value="bottom-right">右下角 (頁腳旁)</option>
                                                        </select>
                                                    </div>
                                                    <div className="form-group">
                                                        <label>浮水印大小 (高度 px)</label>
                                                        <input type="number" value={globalMeta.watermarkSize || 40} onChange={(e) => updateGlobalMeta('watermarkSize', e.target.value)} min="10" max="200" />
                                                    </div>
                                                </>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {viewMode === 'preview' && (
                        <div className="builder-container" style={{ justifyContent: 'center', height: 'auto', background: '#e8e8e8', padding: '40px 20px', borderRadius: '12px' }}>
                            <div className={`preview-wrapper ${previewDevice}`}>
                                <PreviewViewer config={finalJSON} />
                            </div>
                        </div>
                    )}

                    {showPublishModal && (
                        <div className="modal-overlay">
                            <div className="modal-content">
                                <button className="close-modal-btn" onClick={() => setShowPublishModal(false)}>✕</button>
                                <h2 style={{ color: '#086788', marginTop: 0 }}>🎉 發布成功並存入雲端！</h2>
                                <p style={{ lineHeight: '1.6' }}>
                                    您的圖表設定已成功存入 Firebase！專屬 ID 為：<strong style={{ background: '#eee', padding: '2px 6px', borderRadius: '4px' }}>{publishedId}</strong>
                                </p>
                                <p style={{ fontWeight: 'bold', marginTop: '20px' }}>請複製以下的 iframe 程式碼，並貼上到您的新聞後台中：</p>

                                <div className="code-snippet">
                                    &lt;iframe <br />
                                    &nbsp;&nbsp;src="https://你的帳號.github.io/你的儲存庫/viewer.html?id={publishedId}" <br />
                                    &nbsp;&nbsp;width="100%" <br />
                                    &nbsp;&nbsp;height="800px" <br />
                                    &nbsp;&nbsp;frameborder="0" <br />
                                    &nbsp;&nbsp;scrolling="no"<br />
                                    &gt;&lt;/iframe&gt;
                                </div>

                                <div style={{ display: 'flex', gap: '15px', marginTop: '30px', justifyContent: 'flex-end' }}>
                                    <button className="action-btn" style={{ background: '#eee', color: '#555', padding: '10px 20px' }} onClick={() => setShowPublishModal(false)}>關閉</button>
                                    <button className="publish-btn" onClick={handleCopy}>📋 一鍵複製代碼</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DashboardApp />);
    </script>
</body>

</html>
